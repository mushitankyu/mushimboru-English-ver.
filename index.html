<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ムシンボル | 昆虫本質診断</title>
    <style>
        :root {
            --primary-bg: #0b140d;
            --accent-color: #a3d133;
            --text-color: #e0e0e0;
            --card-bg: rgba(20, 30, 25, 0.95);
            --cam-btn-color: #00bfff; 
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            overflow: hidden; 
        }

        .forest-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0b140d 0%, #1a2e1d 50%, #050a05 100%);
            z-index: -1;
        }

        .container {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; padding: 20px; box-sizing: border-box;
            position: relative;
        }

        .screen {
            background: var(--card-bg); backdrop-filter: blur(20px);
            padding: clamp(20px, 5vw, 40px); border-radius: 8px;
            width: 90%; max-width: 650px;
            height: 500px; 
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            display: none; 
            text-align: center;
            box-sizing: border-box;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #result-screen { height: auto; min-height: 500px; max-height: 90vh; overflow-y: auto; justify-content: flex-start; padding-top: 40px; }
        #camera-screen { width: 100vw; height: 100vh; max-width: none; border-radius: 0; padding: 0; background: #000; z-index: 100; }

        .active { display: flex !important; animation: fadeIn 0.6s forwards; }

        .logo-area h1 {
            font-size: clamp(2rem, 10vw, 4.5rem); 
            letter-spacing: clamp(5px, 3vw, 15px); 
            margin: 0;
            color: #fff; text-shadow: 0 0 25px rgba(163, 209, 51, 0.5); font-weight: 100;
            width: 100%; white-space: nowrap;
        }
        .subtitle { color: var(--accent-color); letter-spacing: 5px; margin-top: 10px; font-weight: 300; }

        /* 言語切り替えボタン */
        .lang-switch-container {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 5px;
            z-index: 10;
        }
        .lang-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: #aaa;
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .lang-btn.active-lang {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: #000;
            font-weight: bold;
        }

        .progress-bar { height: 2px; background: #222; margin-bottom: 20px; width: 100%; }
        .progress-fill { height: 100%; background: var(--accent-color); width: 0%; transition: width 0.3s; }

        .question-text { font-size: clamp(1.1rem, 4.5vw, 1.4rem); font-weight: bold; line-height: 1.5; margin-bottom: 25px; min-height: 3.5em; display: flex; align-items: center; justify-content: center; width: 100%; }
        .options { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .opt-btn { padding: 15px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #ccc; border-radius: 4px; cursor: pointer; font-size: 0.95rem; text-align: left; transition: all 0.3s; line-height: 1.4; min-height: 55px; }
        .opt-btn:hover { background: rgba(163, 209, 51, 0.15); border-color: var(--accent-color); color: #fff; }

        .back-btn { margin-top: 20px; background: transparent; border: none; color: #666; cursor: pointer; font-size: 0.8rem; text-decoration: underline; letter-spacing: 1px; visibility: hidden; }

        .insect-name { font-size: clamp(2rem, 6vw, 3rem); margin: 5px 0; color: #fff; font-family: serif; }
        .photo-container { width: 100%; height: auto; max-height: 250px; overflow: hidden; border-radius: 4px; margin: 10px 0; border: 1px solid #333; background: #000; display: flex; justify-content: center; align-items: center; }
        .insect-photo { width: 100%; height: 100%; object-fit: contain; }

        .start-btn { margin-top: 30px; padding: 15px 50px; background: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); cursor: pointer; font-size: 1rem; letter-spacing: 2px; transition: 0.4s; align-self: center; }
        .start-btn:hover { background: var(--accent-color); color: #000; box-shadow: 0 0 20px var(--accent-color); }

        .cam-btn { border-color: var(--cam-btn-color); color: var(--cam-btn-color); margin-top: 15px; }
        .cam-btn:hover { background: var(--cam-btn-color); color: #000; box-shadow: 0 0 20px var(--cam-btn-color); }

        .warning-text { margin-top: 35px; color: #ff4d4d; font-size: 0.85rem; font-weight: bold; text-align: center; width: 100%; }
        
        .mbti-badge { color: var(--accent-color); font-weight: bold; letter-spacing: 3px; font-size: 1.4rem; }
        .type-intro { font-size: 0.9rem; color: #aaa; margin-top: 2px; letter-spacing: 1px; }

        .camera-wrapper { position: relative; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #video { width: 100%; height: 100%; object-fit: cover; transition: transform 0.2s; position: absolute; top: 0; left: 0; }
        
        .insect-overlay { 
            position: absolute; 
            bottom: 80px; 
            right: 0px; 
            width: 300px; 
            height: 300px; 
            background: transparent; 
            border: none; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            pointer-events: none; 
            z-index: 101; 
        }

        #overlay-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            mix-blend-mode: multiply; 
            display: none; 
        }

        .zoom-controls { position: absolute; bottom: 140px; left: 0; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 102; }
        .zoom-btn { background: rgba(0,0,0,0.6); border: 1px solid #fff; color: #fff; border-radius: 50%; width: 45px; height: 45px; font-size: 0.8rem; cursor: pointer; }

        .cam-controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-around; align-items: center; z-index: 102; }
        .shutter { width: 70px; height: 70px; border-radius: 50%; background: #fff; border: 5px solid rgba(163, 209, 51, 0.5); cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -48%); } to { opacity: 1; transform: translate(-50%, -50%); } }
    </style>
</head>

<div class="forest-bg"></div>
<div class="container">
    <div id="home-screen" class="screen active">
        <div class="lang-switch-container">
            <button id="lang-ja-btn" class="lang-btn active-lang" onclick="setLanguage('ja')">日本語</button>
            <button id="lang-en-btn" class="lang-btn" onclick="setLanguage('en')">English</button>

        <div class="logo-area"><h1>MUSHIMBOL</h1><p class="subtitle" id="home-subtitle">― 本質探求版 ―</p></div>

        <div class="warning-text" id="home-warning">最後に虫の写真が表示されます。ご注意ください。</div>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
        <div id="status-text" style="font-size: 0.8rem; color: #a3d133; margin-bottom: 10px; letter-spacing: 2px; text-transform: uppercase;">Analyzing...</div>
        <div id="q-text" class="question-text"></div>
        <div class="options">
            <button class="opt-btn" id="btnA" onclick="handleAnswer('A')"></button>
            <button class="opt-btn" id="btnB" onclick="handleAnswer('B')"></button>
        </div>
        <button id="back-button" class="back-btn" onclick="goBack()">ひとつ前の質問に戻る</button>
    </div>

    <div id="result-screen" class="screen">
        <p style="color: var(--accent-color); font-weight: bold; letter-spacing: 2px; margin-bottom: 5px;" id="result-title-badge">YOUR SYMBOL</p>

        <div id="res-intro" class="type-intro"></div>
        <h2 class="insect-name" id="res-name"></h2>
        <div class="photo-container"><img id="res-img" class="insect-photo" src="" alt=""></div>
        <p id="res-desc" style="line-height: 1.8; text-align: left; margin: 20px 0; color: #bbb;"></p>
        <button class="start-btn cam-btn" id="cam-btn-text" onclick="openCamera()">君のマッチした虫と記念撮影をしよう！</button>
        <button class="start-btn" id="restart-btn-text" onclick="location.reload()">最初に戻る</button>
    </div>

    <div id="camera-screen" class="screen">
        <div class="camera-wrapper">
            <video id="video" autoplay playsinline></video>
            <div class="zoom-controls">

                <button class="zoom-btn" onclick="applyZoom(1.0)">1.0x</button>
                <button class="zoom-btn" onclick="applyZoom(2.0)">2.0x</button>
            </div>
            <div class="insect-overlay">
                <img id="overlay-img" src="" alt="">
            </div>
            <div class="cam-controls">
                <button class="start-btn" id="cam-back-text" style="margin:0; padding:10px 20px; border-color:#fff; color:#fff;" onclick="closeCamera()">戻る</button>
                <button class="shutter" onclick="takePhoto()"></button>
                <div style="width:60px;"></div>
            </div>
        </div>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>
</div>

        ja: { q: "あなたは、どっちのタイプ？", a: "現状を打破し、新しい世界を自ら作り上げたい", b: "自分を研ぎ澄まし、深い安らぎと調和を見つけたい" },
        en: { q: "Which type matches you best?", a: "Break the status quo and craft a brand new world yourself", b: "Refine your inner self and seek profound peace and harmony" }
    };

    const pathAQuestionsJA = [{q:"勝負をするなら？",a:"正面から堂々と戦う",b:"裏をかいて賢く勝つ",type:"T"},{q:"リーダーの役割は？",a:"明確なビジョンを示すこと",b:"メンバーの能力を引き出すこと",type:"E"},{q:"失敗した時",a:"すぐに別の方法を試す",b:"原因を徹底的に分析する",type:"J"},{q:"未知の分野への挑戦は？",a:"ワクワクして飛び込む",b:"入念に準備してから挑む",type:"S"},{q:"評価されるならどっち？",a:"「個人の実力」",b:"「組織への貢献」",type:"T"},{q:"休息の仕方は？",a:"スポーツや外出で発散する",b:"家で戦略を練り直す",type:"E"},{q:"他人のミスに対しては？",a:"ハッキリと指摘する",b:"フォローして次に繋げる",type:"F"},{q:"自分のアイデアは？",a:"すぐに実行して形にしたい",b:"じっくり温めて完璧にしたい",type:"P"},{q:"人との関わり方は？",a:"広く浅く多くの情報を得たい",b:"信頼できる少数と深く組みたい",type:"I"},{q:"プレゼンするなら？",a:"熱意で人を動かしたい",b:"論理で人を納得させたい",type:"T"},{q:"ライバルの存在は？",a:"自分の成長に必要不可欠だ",b:"できればいない方がいい",type:"J"},{q:"トラブルが起きたら？",a:"自分が先頭に立って解決する",b:"周囲と協力して分担する",type:"E"},{q:"大切にしているのは？",a:"過去の経験",b:"未来の可能性",type:"N"},{q:"仕事の進め方は？",a:"スピード重視",b:"質重視",type:"J"},{q:"決断の速さは？",a:"即断即決",b:"熟考してから",type:"T"},{q:"集団の中での自分は？",a:"目立つ存在でありたい",b:"黒子として支えたい",type:"E"},{q:"ルールに対しては？",a:"必要なら変えていく",b:"守ることで秩序を保つ",type:"S"},{q:"好きな言葉は？",a:"「開拓」",b:"「統治」",type:"T"},{q:"朝のルーティンは？",a:"分刻みで決まっている",b:"その日の気分で変える",type:"J"},{q:"他人に求めるのは？",a:"スピード感",b:"誠実さ",type:"F"},{q:"大きな決断をする時",a:"自分の勘を信じる",b:"客観的な証拠を集める",type:"S"},{q:"対立が起きたら？",a:"納得するまで議論する",b:"お互いの妥協点を探す",type:"T"},{q:"成功の定義は？",a:"地位や名声を得ること",b:"自分の信念を貫くこと",type:"J"},{q:"人生は？",a:"戦いである",b:"ゲームである",type:"E"}];
    const pathAQuestionsEN = [{q:"When facing a challenge:",a:"Fight directly and fairly from the front",b:"Outsmart the opponent with clever strategy",type:"T"},{q:"The role of a leader is:",a:"To showcase a clear, unyielding vision",b:"To bring out the full capabilities of members",type:"E"},{q:"When a failure occurs:",a:"Immediately pivot and try another approach",b:"Thoroughly analyze the root cause first",type:"J"},{q:"Entering uncharted territory:",a:"Dive in fueled by pure excitement",b:"Proceed only after meticulous preparation",type:"S"},{q:"How do you prefer to be evaluated?",a:"Individual competence and power",b:"Contribution and value to the group",type:"T"},{q:"Your way of recharging:",a:"Release stress through sports or going out",b:"Stay home and reformulate strategies",type:"E"},{q:"Regarding others' mistakes:",a:"Point them out clearly and directly",b:"Provide backup to ensure future success",type:"F"},{q:"Your creative ideas:",a:"Execute immediately to take tangible shape",b:"Nurture them slowly to absolute perfection",type:"P"},{q:"Your style of socializing:",a:"Gather broad information from many people",b:"Partner deeply with a trusted few",type:"I"},{q:"When giving a presentation:",a:"Move people using genuine enthusiasm",b:"Convince people through solid logic",type:"T"},{q:"The presence of a rival:",a:"Is indispensable for personal growth",b:"Is something I'd rather avoid if possible",type:"J"},{q:"When a crisis strikes:",a:"Take the lead yourself to resolve it",b:"Collaborate and distribute tasks evenly",type:"E"},{q:"What do you treasure more?",a:"Proven past experiences",b:"Unbounded future possibilities",type:"N"},{q:"Your workflow preference:",a:"Prioritizing speed and momentum",b:"Prioritizing absolute quality",type:"J"},{q:"Your decision-making speed:",a:"Decide immediately on the spot",b:"Ponder thoroughly before acting",type:"T"},{q:"Your presence in a group:",a:"Desiring to stand out and be noticed",b:"Supporting effectively from behind the scenes",type:"E"},{q:"Regarding strict rules:",a:"Change them dynamically if necessary",b:"Uphold them faithfully to protect order",type:"S"},{q:"Which phrase resonates more?",a:"“Pioneering Exploration”",b:"“Ordered Governance”",type:"T"},{q:"Your morning routine:",a:"Scheduled precisely down to the minute",b:"Varies freely based on daily mood",type:"J"},{q:"What do you expect from others?",a:"A swift sense of urgency",b:"Earnest integrity",type:"F"},{q:"Making a monumental decision:",a:"Trusting your raw gut intuition",b:"Gathering objective, concrete evidence",type:"S"},{q:"When a conflict arises:",a:"Debate passionately until fully resolved",b:"Seek a fair compromise for both sides",type:"T"},{q:"Definition of true success:",a:"Gaining high status and renowned prestige",b:"Staying entirely true to your core beliefs",type:"J"},{q:"To you, life is:",a:"A glorious battlefield",b:"An intriguing game",type:"E"}];

    const pathBQuestionsJA = [{q:"自分を見つめる時間は？",a:"毎日欠かさず作りたい",b:"時々で十分だ",type:"I"},{q:"物事の学び方は？",a:"独学で深めたい",b:"誰かに教わりたい",type:"S"},{q:"環境の変化には？",a:"徐々に慣れていきたい",b:"すぐに対応したい",type:"P"},{q:"大切にしたいのは？",a:"自分の感受性",b:"社会的な常識",type:"N"},{q:"趣味に没頭するなら？",a:"一人で極めたい",b:"仲間と共有したい",type:"I"},{q:"判断に迷った時は？",a:"自分の心が落ち着く方を選ぶ",b:"他人がどう思うかを考える",type:"F"},{q:"理想の生活は？",a:"自給足のようなシンプルさ",b:"便利で賑やかな都会風",type:"S"},{q:"感情の起伏は？",a:"あまり表に出さない",b:"素早く表現する",type:"I"},{q:"計画を立てるのは？",a:"苦手で、流れに身を任せる",b:"好きで、きっちり決めたい",type:"J"},{q:"読書をするなら？",a:"専門的な実用書",b:"物語や詩集",type:"N"},{q:"嫌いな状況は？",a:"注目を浴び続けること",b:"孤独を感じること",type:"I"},{q:"褒められて嬉しいのは？",a:"「独特な感性だね」",b:"「丁寧な仕事だね」",type:"S"},{q:"美しさを感じるのは？",a:"自然のままの姿",b:"整えられた姿",type:"N"},{q:"会話のスタイルは？",a:"聞き役に回ることが多い",b:"自分から話題を振る",type:"I"},{q:"座右の銘にするなら？",a:"「柳に風」",b:"「石の上にも三年」",type:"P"},{q:"人付き合いで疲れたら",a:"完全に一人で閉じこもる",b:"信頼できる一人とだけ話す",type:"I"},{q:"大切にしている持ち物は？",a:"長く使い込んだ愛着のあるもの",b:"最新の便利なもの",type:"S"},{q:"夢や目標は？",a:"心の中に秘めておく",b:"紙に書いて貼る",type:"I"},{q:"約束の時間は？",a:"少し遅れても気にしない",b:"5分前には到着する",type:"P"},{q:"自分へのご褒美は？",a:"贅沢な静寂の時間",b:"美味しい食事",type:"I"},{q:"物語の結末は？",a:"ハッピーエンドがいい",b:"考えさせられる余韻がいい",type:"F"},{q:"誰かと意見が違ったら？",a:"静かに身を引く",b:"自分の考えを穏やかに伝える",type:"I"},{q:"人生に求めるのは？",a:"深い充足感",b:"確かな安定",type:"N"},{q:"自分を動物に例えるなら？",a:"猫のような自由さ",b:"犬のような忠実さ",type:"P"}];
    const pathBQuestionsEN = [{q:"Time for self-reflection:",a:"Should be carved out every single day",b:"Should be perfectly fine just once in a while",type:"I"},{q:"Your learning style preference:",a:"Deepening knowledge through self-study",b:"Being guided and taught by someone",type:"S"},{q:"Adapting to environmental shifts:",a:"Adjusting gradually at a comfortable pace",b:"Responding and conforming immediately",type:"P"},{q:"What do you prioritize protecting?",a:"Your own unique sensitivity",b:"Established social norms and customs",type:"N"},{q:"When indulging in a hobby:",a:"Mastering it deeply entirely alone",b:"Sharing the experience with companions",type:"I"},{q:"When torn on a tough decision:",a:"Choosing the option that brings inner calm",b:"Considering how other people will perceive it",type:"F"},{q:"Your ideal lifestyle rhythm:",a:"Self-sufficient and absolute simplicity",b:"Convenient, vibrant, and city-like",type:"S"},{q:"Your emotional fluctuations:",a:"Rarely shown on the outer surface",b:"Expressed and processed dynamically",type:"I"},{q:"Formulating strict plans:",a:"Not my style; I prefer to go with the flow",b:"Highly favored; I like them firmly set",type:"J"},{q:"Your preferred reading choice:",a:"Specialized, practical reference books",b:"Immersive stories or collections of poetry",type:"N"},{q:"A situation you genuinely dislike:",a:"Being constantly under the spotlight",b:"Feeling an isolating lack of connection",type:"I"},{q:"Which compliment delights you more?",a:"“You possess a highly unique perspective”",b:"“You perform exceptionally meticulous work”",type:"S"},{q:"Where do you perceive true beauty?",a:"In completely raw, untouched nature",b:"In beautifully structured and refined forms",type:"N"},{q:"Your standard style of conversation:",a:"Naturally falling into a listening role",b:"Actively bringing up fresh topics myself",type:"I"},{q:"Your choice of a personal motto:",a:"“Yielding like a willow to the wind”",b:"“Perseverance prevails over all stones”",type:"P"},{q:"When social interactions drain you:",a:"Withdrawing completely into total solitude",b:"Conversing solely with one trusted friend",type:"I"},{q:"Your most treasured possessions:",a:"Items used for years with deep attachment",b:"The latest cutting-edge, convenient tools",type:"S"},{q:"Your grand dreams and goals:",a:"Kept safely hidden inside your heart",b:"Written down explicitly on a visible wall",type:"I"},{q:"Regarding scheduled appointments:",a:"Not bothered if things run slightly late",b:"Arriving reliably at least five minutes early",type:"P"},{q:"Your ultimate personal reward:",a:"Luxurious moments of absolute silence",b:"Indulging in a genuinely delicious meal",type:"I"},{q:"A story's ideal conclusion:",a:"A clear, heartwarming happy ending",b:"A lingering finish that provokes deep thought",type:"F"},{q:"When viewpoints clash with someone:",a:"Silently stepping away from the argument",b:"Expressing your thoughts in a calm manner",type:"I"},{q:"What do you seek most from life?",a:"A profound sense of inner fulfillment",b:"Reliable, long-term stability",type:"N"},{q:"Comparing yourself to an animal:",a:"A cat with total independence and freedom",b:"A dog with unwavering loyalty and devotion",type:"P"}];

    let isPathChosen = false, selectedPath = null, step = 0, scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 }, history = [], stream = null, currentZoom = 1.0, currentInsectImg = null;

    function setLanguage(lang) {
        currentLang = lang;
        document.getElementById('lang-ja-btn').classList.toggle('active-lang', lang === 'ja');
        document.getElementById('lang-en-btn').classList.toggle('active-lang', lang === 'en');
        
        // UI文字列の更新
        document.getElementById('home-subtitle').innerText = uiText[lang].subtitle;
        document.getElementById('start-btn-text').innerText = uiText[lang].startBtn;
        document.getElementById('home-warning').innerText = uiText[lang].warning;
        document.getElementById('back-button').innerText = uiText[lang].backBtn;
        document.getElementById('cam-btn-text').innerText = uiText[lang].camBtn;
        document.getElementById('restart-btn-text').innerText = uiText[lang].restartBtn;
        document.getElementById('cam-back-text').innerText = uiText[lang].camBack;
    }

    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function startApp() { showScreen('quiz-screen'); renderQuestion(); }
    
    function renderQuestion() {
        let q; const btn = document.getElementById('back-button');
        if (!isPathChosen) { 
            q = branchQuestion[currentLang]; 
            document.getElementById('status-text').innerText = currentLang === 'ja' ? "Path Choice" : "PATH CHOICE"; 
            btn.style.visibility = 'hidden'; 
        } else { 
            if (currentLang === 'ja') {
                const list = selectedPath === 'A' ? pathAQuestionsJA : pathBQuestionsJA; 
                q = list[step];
                document.getElementById('status-text').innerText = `Analysis: ${step + 1} / 24`;
            } else {
                const list = selectedPath === 'A' ? pathAQuestionsEN : pathBQuestionsEN; 
                q = list[step];
                document.getElementById('status-text').innerText = `ANALYSIS: ${step + 1} / 24`;
            }
            btn.style.visibility = 'visible'; 
        }
        document.getElementById('q-text').innerText = q.q; document.getElementById('btnA').innerText = q.a; document.getElementById('btnB').innerText = q.b;
        document.getElementById('progress').style.width = isPathChosen ? ((step+1)/24*100)+"%" : "4%";
    }

    function handleAnswer(choice) {
        history.push({isPathChosen, selectedPath, step, scores: JSON.parse(JSON.stringify(scores))});
        if (!isPathChosen) { selectedPath = choice; isPathChosen = true; } 
        else { 
            const list = selectedPath === 'A' ? pathAQuestionsJA : pathBQuestionsJA; 
            scores[choice === 'A' ? list[step].type : getOpposite(list[step].type)]++; 
            step++; 
        }
        if (step < 24) renderQuestion(); else showResult();
    }

    function goBack() { if (history.length === 0) return; const last = history.pop(); isPathChosen = last.isPathChosen; selectedPath = last.selectedPath; step = last.step; scores = last.scores; renderQuestion(); }
    function getOpposite(t) { return {E:'I', I:'E', S:'N', N:'S', T:'F', F:'T', J:'P', P:'J'}[t]; }
    
    async function showResult() {
        showScreen('result-screen');
        const mbti = (scores.E>=scores.I?'E':'I')+(scores.S>=scores.N?'S':'N')+(scores.T>=scores.F?'T':'F')+(scores.J>=scores.P?'J':'P');
        document.getElementById('res-mbti').innerText = mbti;

        let key;
        if (selectedPath === 'A') {
            if (scores.T >= 8) key = "A1"; else if (scores.E >= 8) key = "A3"; else if (scores.J >= 8) key = "A2"; else if (scores.S >= 8) key = "A4"; else key = mbti;
        } else {
            if (scores.I >= 8) key = "B1"; else if (scores.S >= 8) key = "B2"; else if (scores.P >= 8) key = "B3"; else if (scores.N >= 8) key = "B4"; else key = mbti;
        }

        const insect = insectDB[key] || insectDB[mbti] || insectDB["ISTJ"];
        document.getElementById('res-name').innerText = insect.name[currentLang]; 
        document.getElementById('res-desc').innerText = insect.desc[currentLang]; 
        document.getElementById('res-intro').innerText = insect.intro[currentLang];
        
        currentInsectImg = insect.img;
        const ov = document.getElementById('overlay-img');
        ov.src = currentInsectImg;
        ov.style.display = "block";

        try { const r = await fetch(`https://ja.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(insect.wiki)}`); const d = await r.json(); document.getElementById('res-img').src = d.thumbnail ? d.thumbnail.source : ""; } catch(e){}
    }

    async function openCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
            document.getElementById('video').srcObject = stream;
            showScreen('camera-screen');
        } catch (err) { alert(uiText[currentLang].camAlert); }
    }

    function closeCamera() { if (stream) stream.getTracks().forEach(track => track.stop()); showScreen('result-screen'); }

    function applyZoom(val) {
        currentZoom = val;
        const video = document.getElementById('video');
        const track = stream ? stream.getVideoTracks()[0] : null;
        if (track) {
            const cap = track.getCapabilities();
            if (cap.zoom) {
                track.applyConstraints({ advanced: [{ zoom: val }] });
                video.style.transform = "scale(1)";
            } else {
                video.style.transform = `scale(${val})`;
            }
        }
    }

    function takePhoto() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = video.videoWidth; 
        canvas.height = video.videoHeight;
        
        const sw = canvas.width / currentZoom;
        const sh = canvas.height / currentZoom;
        const sx = (canvas.width - sw) / 2;
        const sy = (canvas.height - sh) / 2;

        const insectImg = new Image();
        insectImg.crossOrigin = "anonymous";
        
        insectImg.onload = function() {
            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
            
            const viewW = video.offsetWidth || window.innerWidth;
            const viewH = video.offsetHeight || window.innerHeight;
            
            const cssSize = 300;
            const cssBottom = 80;
            const cssRight = 0;
            
            const videoScale = Math.max(canvas.width / viewW, canvas.height / viewH);
            const size = cssSize * videoScale;
            
            const renderW = viewW * videoScale;
            const renderH = viewH * videoScale;
            const posX = ((canvas.width + renderW) / 2) - (cssRight * videoScale) - size;
            const posY = ((canvas.height + renderH) / 2) - (cssBottom * videoScale) - size;
            
            ctx.globalCompositeOperation = 'source-over'; 
            ctx.drawImage(this, posX, posY, size, size);

            canvas.toBlob((blob) => {
                if (!blob) return;
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `mushimbol_${Date.now()}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(() => URL.revokeObjectURL(url), 100);
            }, 'image/png');
        };

        insectImg.onerror = function() {
            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
            canvas.toBlob((blob) => {
                if (!blob) return;
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = "mushimbol_no_insect.png";
                link.click();
                setTimeout(() => URL.revokeObjectURL(url), 100);
            }, 'image/png');
        };

        insectImg.src = currentInsectImg + '?' + new Date().getTime();
    }

    // 初期言語設定を呼び出し
    setLanguage('ja');
</script>
